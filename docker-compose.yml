services:
  isa_ai_analyst:
    image: node:22-slim
    container_name: isa_ai_analyst
    env_file:
      - .env
    restart: unless-stopped
    working_dir: /app
    environment:
      - TZ=Europe/London
      - OPENROUTER_API_KEY=${LLM_API_KEY}
    volumes:
      - ./app:/app
      - ./config:/app/config
      # This is the magic bullet. It saves the entire configuration to your Mac forever.
      - ./openclaw_data:/root/.openclaw

    # Look how clean this is now. No hacks, no delays. Just install and run.
    command: >
      sh -c 'apt-get update && apt-get install -y python3 python3-pip ca-certificates && pip3 install requests schedule --break-system-packages && npm install -g openclaw@2026.6.5 && (cp /app/config/IDENTITY.md /root/.openclaw/workspace/IDENTITY.md || true) && (python3 /app/scheduler.py &) && openclaw gateway --allow-unconfigured'